"HexTags"
{
	// =========================================================================
	// HexTags Lite - Configuration Guide
	// =========================================================================
	// Priority Levels (Hierarchy):
	// 1. SteamID (Highest - Priority 4)
	// 2. Admin Group (Priority 3) - Starts with @ (e.g., "@Admin")
	// 3. Admin Flag (Priority 2)  - Single characters (e.g., "z")
	// 4. Default (Lowest - Priority 1)
	//
	// Available Settings in each section:
	// "ScoreTag"  : The tag shown on the Scoreboard (ClanTag). No colors supported.
	// "ChatTag"   : The tag shown before the name in chat. Colors supported.
	// "ChatColor" : The color of the chat message.
	// "NameColor" : The color of the player's name. (Use "{teamcolor}" for default).
	// "ForceTag"  : "1" to continuously force the ScoreTag, "0" to set it only on spawn.
	// =========================================================================

	// Example: SteamID Match (Highest Priority)
	"STEAM_0:1:396607694"
	{
		"ScoreTag"  "[Moongetsu]"
		"ChatTag"   "{darkred}[Moongetsu] {default}"
		"ChatColor" "{darkred}"
		"NameColor" "{grey}"
	}

	// Example: Admin Group Match (Priority 3)
	// Must match the Group Name defined in admin_groups.cfg
	"@Admin"
	{
		"ScoreTag"  "[ADMIN]"
		"ChatTag"   "{darkblue}[ADMIN] {default}"
		"ChatColor" "{grey}"
		"NameColor" "{darkblue}"
	}

	// Example: Admin Flag Match (Priority 2)
	// Use a single flag character (e.g., 'z' for Root, 'b' for Generic Admin)
	"z"
	{
		"ScoreTag"  "[ROOT]"
		"ChatTag"   "{orchid}[ROOT] {default}"
		"ChatColor" "{grey}"
		"NameColor" "{orchid}"
	}

	// Example: Default (Lowest Priority) - Applies to everyone not matched above
	"default"
	{
		"ScoreTag"  ""
		"ChatTag"   "{teamcolor}[PLAYER] {default}"
		"ChatColor" "{grey}"
		"NameColor" "{teamcolor}"
	}
}